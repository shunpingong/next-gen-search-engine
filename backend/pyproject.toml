[project]
name = "backend"
version = "0.1.0"
description = "Next-gen search engine backend with web scraping and metadata extraction"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.117.1",
    "uvicorn>=0.37.0",
    # Web scraping dependencies
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "selenium>=4.15.0",
    "python-dotenv>=1.0.0",
    "duckduckgo-search>=4.0.0",
    "lxml>=4.9.0",
    "firecrawl>=4.3.6",
]
